# Python lint/type checks only (no JS). Mirrors the Python half of PixelGoose's
# CircleCI job, without reviewdog — this repo is low-traffic so console
# failures are enough.
version: 2.1

jobs:
  lint:
    docker:
      - image: cimg/python:3.12
    environment:
      RUFF_CONFIG: "pyproject.toml"
    steps:
      - checkout

      # ty only auto-discovers VIRTUAL_ENV / .venv (not a bare pip --user /
      # system install). Put deps in a project venv and keep it on PATH for
      # every later step via CircleCI's BASH_ENV.
      - run:
          name: Install Python dependencies and linting tools
          command: |
            set -euo pipefail
            python -m venv .venv
            echo 'export PATH="'"$PWD"'/.venv/bin:$PATH"' >> "$BASH_ENV"
            # shellcheck source=/dev/null
            . .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements-dev.txt

      - run:
          name: Verify Ruff version parity
          command: |
            set -euo pipefail
            expected="$(grep -E '^ruff==' requirements-dev.txt | head -n1 | cut -d= -f3)"
            if [ -z "$expected" ]; then
              echo "requirements-dev.txt must pin ruff==<version>"
              exit 1
            fi
            actual="$(ruff --version | awk '{print $2}')"
            if [ "$actual" != "$expected" ]; then
              echo "Ruff version mismatch: requirements-dev.txt pins ${expected}, but CI installed ${actual}."
              exit 1
            fi
            echo "Ruff version parity verified: ${actual}"

      - run:
          name: Ruff format check
          command: ruff format --check --force-exclude .

      - run:
          name: Ruff lint
          command: ruff check --force-exclude .

      - run:
          name: Mypy (strict)
          command: mypy --strict .

      - run:
          name: ty
          # Explicit --python so resolution does not depend on shell activation.
          command: ty check --python .venv .

      - run:
          name: Vulture (fail on unreachable/unsatisfiable)
          command: |
            set -euo pipefail
            mkdir -p reports
            # No path arg: use [tool.vulture] paths=["app"] so .venv is skipped.
            vulture > reports/vulture.txt || true
            grep -E "(unreachable|unsatisfiable)" reports/vulture.txt > reports/vulture-critical.txt || true
            if [ -s reports/vulture-critical.txt ]; then
              echo "Vulture found unreachable/unsatisfiable code:"
              cat reports/vulture-critical.txt
              exit 1
            fi
            echo "No critical Vulture issues found."

      - store_artifacts:
          path: reports
          destination: lint-reports

workflows:
  lint:
    jobs:
      - lint

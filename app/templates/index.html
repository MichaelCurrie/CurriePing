<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }}</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1f2933;
    --muted: #6b7480;
    --border: #e7eaee;
    --up: #26a269;
    --partial: #e5a13a;
    --down: #d9463e;
    --none: #e4e7eb;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171a;
      --card: #1c2024;
      --text: #e7eaee;
      --muted: #9aa4af;
      --border: #2a2f35;
      --none: #2a2f35;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  header.page { text-align: center; margin-bottom: 28px; }
  header.page h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  header.page .sub { color: var(--muted); font-size: 13px; }

  /* Present-moment strip: one block per service, current status only. */
  .now-strip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 12px;
    margin-bottom: 28px;
  }
  .now-strip .label {
    color: var(--muted); font-size: 12px; font-weight: 500;
    margin-bottom: 10px;
  }
  .now-blocks {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: stretch;
  }
  .now-block {
    flex: 1 1 48px; min-width: 36px; max-width: 80px;
    height: 32px; border-radius: 3px;
    background: var(--none);
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: default;
  }
  .now-block.up { background: var(--up); }
  .now-block.down { background: var(--down); }
  .now-block.unknown { background: var(--none); }
  .now-block .favicon {
    width: 16px; height: 16px;
    object-fit: contain;
    /* Keep alpha: the status fill should show through transparent favicons. */
  }

  .component {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px 16px;
    margin-bottom: 14px;
  }
  .component .top {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    margin-bottom: 12px;
  }
  .component .name { font-weight: 600; font-size: 15px; text-decoration: none; color: var(--text); }
  .component .name:hover { text-decoration: underline; }
  .component .favicon {
    width: 16px; height: 16px; border-radius: 3px;
    vertical-align: -3px; margin-right: 8px; object-fit: contain;
  }
  .component .state { font-size: 13px; font-weight: 500; }
  .state.operational { color: var(--up); }
  .state.down        { color: var(--down); }
  .state.degraded    { color: var(--partial); }
  .state.unknown     { color: var(--muted); }

  .bars { display: flex; gap: 2px; align-items: stretch; height: 34px; }
  .bars.recent { height: 22px; margin-top: 10px; }
  .bar {
    flex: 1 1 0; border-radius: 2px; background: var(--none); min-width: 2px;
    position: relative; cursor: default;
  }
  .bar.up { background: var(--up); }
  .bar.partial { background: var(--partial); }
  .bar.down { background: var(--down); }

  /* Hover tooltip: immediate, anchored above the bar / now-block. */
  .bar[data-tip]::after,
  .now-block[data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    left: 50%; bottom: calc(100% + 8px);
    transform: translateX(-50%);
    background: #111827; color: #f9fafb;
    font-size: 11px; font-weight: 500; line-height: 1.35;
    white-space: nowrap; padding: 6px 8px; border-radius: 6px;
    pointer-events: none; opacity: 0; z-index: 5;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  .bar[data-tip]::before,
  .now-block[data-tip]::before {
    content: "";
    position: absolute;
    left: 50%; bottom: calc(100% + 2px);
    transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #111827;
    pointer-events: none; opacity: 0; z-index: 5;
  }
  .bar[data-tip]:hover::after,
  .bar[data-tip]:hover::before,
  .now-block[data-tip]:hover::after,
  .now-block[data-tip]:hover::before { opacity: 1; }
  @media (prefers-color-scheme: dark) {
    .bar[data-tip]::after,
    .now-block[data-tip]::after { background: #0b0d10; color: #e7eaee; }
    .bar[data-tip]::before,
    .now-block[data-tip]::before { border-top-color: #0b0d10; }
  }

  /* "90 days ago ——— 99.4% uptime ——— Today" */
  .axis {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 11px; margin-top: 8px;
  }
  .axis .end { flex: 0 0 auto; white-space: nowrap; }
  .axis .rule {
    flex: 1 1 0; height: 0; margin: 0;
    border: none; border-top: 1px solid var(--border);
    min-width: 16px;
  }
  .axis .uptime {
    flex: 0 0 auto; white-space: nowrap;
    font-size: 12px; color: var(--muted);
  }
  .summaries {
    display: flex; flex-wrap: wrap; gap: 8px 18px;
    color: var(--muted); font-size: 12px; margin-top: 12px;
  }
  .summaries strong { color: var(--text); font-weight: 600; }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 26px; }
  footer .powered { display: inline-block; margin-top: 8px; color: var(--muted); text-decoration: none; }
  footer .powered:hover { text-decoration: underline; }
  /* Timezone abbr → Wikidata: visible but quieter than default link blue. */
  a.tz-link {
    color: var(--muted);
    text-decoration: underline;
  }
  a.tz-link:hover { color: var(--text); }
</style>
</head>
<body>
  <div class="wrap">
    <header class="page">
      <h1>{{ title }}</h1>
      <div class="sub" id="updated">Loading…</div>
    </header>

    <div class="now-strip" id="now-strip" hidden>
      <div class="label" id="now-label"></div>
      <div class="now-blocks" id="now-blocks"></div>
    </div>

    <div id="components"></div>

    <footer>
      Checks run every <span id="interval">–</span>s over the last {{ history_days }} days.
      <br>Auto-refreshes; last updated <span id="ago">just now</span>.
      <br><a class="powered" href="https://github.com/MichaelCurrie/CurriePing" target="_blank" rel="noopener">Powered by CurriePing</a>
    </footer>
  </div>

<script>
const HISTORY_DAYS = {{ history_days }};

const STATE_TEXT = {
  operational: "Operational",
  down: "Down",
  degraded: "Degraded",
  unknown: "No data yet",
};

function escapeAttr(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;");
}

function dayTip(b) {
  if (b.state === "none") return `${b.date}: no data`;
  const pct = (b.ratio * 100).toFixed(b.ratio === 1 ? 0 : 1);
  return `${b.date}: ${pct}% up (${b.up}/${b.total} checks)`;
}

function pingTip(p) {
  if (p.state === "none" || p.ts == null) return "No ping yet";
  const d = new Date(p.ts * 1000);
  const stamp = new Intl.DateTimeFormat(undefined, {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hourCycle: "h23",
  }).format(d);
  if (p.ok) {
    const ms = p.latency_ms != null ? ` · ${Math.round(p.latency_ms)}ms` : "";
    const code = p.status_code != null ? ` HTTP ${p.status_code}` : "";
    return `${stamp}: up${code}${ms}`;
  }
  const why = p.error || (p.status_code != null ? `HTTP ${p.status_code}` : "down");
  return `${stamp}: down · ${why}`;
}

function formatUptimeLabel(pct) {
  if (pct === null || pct === undefined) return "—";
  const n = Number(pct);
  const text = Number.isInteger(n) ? String(n) : n.toFixed(1);
  return `${text}%`;
}

function formatWindowLabel(minutes) {
  if (minutes < 60) return `${minutes} min`;
  const hours = minutes / 60;
  if (Number.isInteger(hours)) return `${hours}h`;
  return `${hours.toFixed(1)}h`;
}

function nowBlockClass(status) {
  if (status === "operational") return "up";
  if (status === "down") return "down";
  return "unknown";
}

/** Newest check timestamp across all services (unix seconds), or null. */
function lastPingTs(components) {
  let max = null;
  for (const c of components) {
    const ts = c.latest && c.latest.ts;
    if (ts != null && (max === null || ts > max)) max = ts;
  }
  return max;
}

function renderNowStrip(components) {
  const strip = document.getElementById("now-strip");
  const row = document.getElementById("now-blocks");
  const label = document.getElementById("now-label");
  if (!components.length) {
    strip.hidden = true;
    row.innerHTML = "";
    label.innerHTML = "";
    return;
  }
  strip.hidden = false;
  const pingTs = lastPingTs(components);
  label.innerHTML = pingTs != null
    ? formatUpdated(new Date(pingTs * 1000))
    : "Awaiting first checks";
  row.innerHTML = components.map(c => {
    const cls = nowBlockClass(c.status);
    const state = STATE_TEXT[c.status] || c.status;
    const tip = escapeAttr(`${c.name}: ${state}`);
    const icon = c.icon
      ? `<img class="favicon" src="${c.icon}" alt="" loading="lazy" onerror="this.remove()">`
      : "";
    return `<div class="now-block ${cls}" data-tip="${tip}">${icon}</div>`;
  }).join("");
}

function renderAxis(left, right) {
  return `
    <div class="axis">
      <span class="end">${left}</span>
      <hr class="rule">
      <span class="end">${right}</span>
    </div>`;
}

function renderComponent(c) {
  const el = document.createElement("div");
  el.className = "component";

  const stateText = STATE_TEXT[c.status] || c.status;
  const icon = c.icon
    ? `<img class="favicon" src="${c.icon}" alt="" loading="lazy" onerror="this.remove()">`
    : "";

  const dayBars = (c.buckets || []).map(b =>
    `<div class="bar ${b.state === "none" ? "" : b.state}" data-tip="${escapeAttr(dayTip(b))}"></div>`
  ).join("");

  const recentBars = (c.recent || []).map(p =>
    `<div class="bar ${p.state === "none" ? "" : p.state}" data-tip="${escapeAttr(pingTip(p))}"></div>`
  ).join("");

  const windowLabel = formatWindowLabel(c.recent_window_minutes || HISTORY_DAYS);
  const dayUptime = formatUptimeLabel(c.uptime);
  const recentUptime = formatUptimeLabel(c.recent_uptime);

  el.innerHTML = `
    <div class="top">
      <a class="name" href="${c.url}" target="_blank" rel="noopener">${icon}${c.name}</a>
      <span class="state ${c.status}">${stateText}</span>
    </div>
    <div class="bars">${dayBars}</div>
    ${renderAxis(`${HISTORY_DAYS} days ago`, "Today")}
    <div class="bars recent">${recentBars}</div>
    ${renderAxis(`${windowLabel} ago`, "Now")}
    <div class="summaries">
      <span><strong>${dayUptime}</strong> uptime · ${HISTORY_DAYS} days</span>
      <span><strong>${recentUptime}</strong> uptime · past ${windowLabel}</span>
    </div>`;
  return el;
}

let lastUpdate = null;

// Wikidata items for timezone abbreviations (extend as needed).
const TZ_WIKIDATA = { EDT: "Q941023" };

function formatUpdated(d) {
  // 24-hour clock in the viewer's own timezone.
  const time = new Intl.DateTimeFormat(undefined, {
    hour: "2-digit", minute: "2-digit", second: "2-digit", hourCycle: "h23",
  }).format(d);
  // Short timezone name for the viewer's zone (e.g. "EDT", "GMT+8").
  const parts = new Intl.DateTimeFormat(undefined, {
    hour: "2-digit", timeZoneName: "short", hourCycle: "h23",
  }).formatToParts(d);
  const tz = (parts.find(p => p.type === "timeZoneName") || {}).value || "";
  const href = TZ_WIKIDATA[tz]
    ? "https://www.wikidata.org/wiki/" + TZ_WIKIDATA[tz]
    : "https://www.wikidata.org/w/index.php?search=" + encodeURIComponent(tz);
  const tzLink = tz
    ? ` <a class="tz-link" href="${href}" target="_blank" rel="noopener">${tz}</a>`
    : "";
  return time + tzLink;
}

async function refresh() {
  try {
    const res = await fetch("/api/status", { cache: "no-store" });
    const data = await res.json();

    renderNowStrip(data.components);

    const container = document.getElementById("components");
    container.innerHTML = "";
    data.components.forEach(c => container.appendChild(renderComponent(c)));

    document.getElementById("interval").textContent = data.check_interval_seconds;
    const d = new Date(data.generated_at * 1000);
    document.getElementById("updated").textContent =
      data.components.length + " services monitored";
    lastUpdate = Date.now();
    document.getElementById("ago").innerHTML = formatUpdated(d);
  } catch (e) {
    document.getElementById("updated").textContent = "Unable to load status";
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>

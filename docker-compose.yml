# CurriePing stack — containers on a private Docker network.
#
# Layout:
#   app/     Python monitor (Dockerfile, requirements, source)
#   proxy/   Caddy configs (static edge + optional public proxy)
#
#   monitor  Uptime checker (Flask + waitress on :8080). Probes TARGETS,
#            SQLite + static export under /data. Not the public origin.
#
#   app      Static edge (Caddy on :8080). Serves /data/www (HTML, JSON,
#            baked /icon/* favicons); proxies /api/status and /healthz to
#            monitor. Cloudflare Tunnel keeps pointing at http://app:8080.
#
#   proxy    Optional direct publish of :80/:443 (Caddy + Let's Encrypt when
#            STATUS_DOMAIN is set). Useful for local/dev or raw IPv6 AAAA.
#
#   tunnel   Optional Cloudflare Tunnel (compose profile `tunnel`). Outbound
#            only — no public IP needed. Cloudflare terminates visitor TLS and
#            forwards to app:8080. Enable with COMPOSE_PROFILES=tunnel and a
#            CLOUDFLARE_TUNNEL_TOKEN (see INSTALL.md).
#
# IPv6: the default network is dual-stack. Host publish of :80/:443 on IPv6
# still needs Docker daemon ipv6/ip6tables (scripts/enable-docker-ipv6.sh).
#
# Local / host usage:
#   cp .env.example .env   # edit TARGETS (+ tunnel token for production)
#   docker compose up -d --build --remove-orphans
#
# Explicit project/volume names so the SQLite volume stays stable regardless of
# the host checkout path.

name: currieping

services:
  monitor:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - status-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Named `app` so existing Cloudflare Tunnel hostnames (http://app:8080) keep working.
  app:
    image: caddy:2
    restart: unless-stopped
    volumes:
      - status-data:/data:ro
      - ./proxy/Caddyfile.www:/etc/caddy/Caddyfile:ro
    expose:
      - "8080"
    depends_on:
      monitor:
        condition: service_healthy

  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # `:-:80` => when STATUS_DOMAIN is blank/unset, Caddy binds ":80" and
      # serves plain HTTP. Compose applies the default for empty values; Caddy's
      # own in-file default does not, hence resolving it here.
      - STATUS_DOMAIN=${STATUS_DOMAIN:-:80}
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

  # Visitors → Cloudflare (IPv4+IPv6) → this connector → app:8080 (static edge).
  # No inbound ports required on the EC2 security group for HTTP/S.
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    # Prefer IPv6 edges + HTTP/2 so an IPv6-only EC2 host (no public IPv4 /
    # no NAT64) can still reach Cloudflare. QUIC-to-IPv4 edges will hang.
    command:
      - tunnel
      - --no-autoupdate
      - --edge-ip-version
      - "6"
      - --protocol
      - http2
      - run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      monitor:
        condition: service_healthy
      app:
        condition: service_started

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.28.0.0/16"
        - subnet: "fd00:dead:beef:2::/64"

volumes:
  status-data:
    name: currieping_status-data
  caddy-data:
    name: currieping_caddy-data
  caddy-config:
    name: currieping_caddy-config

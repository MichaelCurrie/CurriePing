# CurriePing stack — two containers on a private Docker network.
#
# Layout:
#   app/     Python service (Dockerfile, requirements, source)
#   proxy/   Caddy reverse-proxy config (Caddyfile)
#
#   app    The Python uptime monitor (Flask + waitress). Probes TARGETS on an
#          interval, writes history to SQLite under /data, serves the status
#          page and /api/status on :8080. Not published to the host; only the
#          proxy can reach it.
#
#   proxy  Caddy reverse proxy. The only thing bound to the host (:80 / :443).
#          Terminates TLS (Let's Encrypt when STATUS_DOMAIN is a hostname) and
#          forwards HTTP to app:8080. When STATUS_DOMAIN is blank it serves
#          plain HTTP on :80 for local testing.
#
# Local / host usage:
#   cp .env.example .env   # edit TARGETS (+ STATUS_DOMAIN for HTTPS)
#   docker compose up -d --build --remove-orphans

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - status-data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # `:-:80` => when STATUS_DOMAIN is blank/unset, Caddy binds ":80" and
      # serves plain HTTP. Compose applies the default for empty values; Caddy's
      # own in-file default does not, hence resolving it here.
      - STATUS_DOMAIN=${STATUS_DOMAIN:-:80}
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  status-data:
  caddy-data:
  caddy-config:
